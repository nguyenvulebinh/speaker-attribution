services:
  nemo_diarization:
    build:
      context: .
      dockerfile: nemo_diarization/Dockerfile
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    environment:
      CUDA_VISIBLE_DEVICES: ${CUDA_DIARIZATION:-7}
    shm_size: 10gb
    ports:
      - "5022:5022"
    restart: on-failure

  force_alignment:
    build:
      context: .
      dockerfile: force_alignment/Dockerfile
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    environment:
      CUDA_VISIBLE_DEVICES: ${CUDA_FORCE_ALIGNMENT:-7}
    shm_size: 10gb
    ports:
      - "5023:5023"
    restart: on-failure

  speaker_attribute:
    build:
      context: speaker_attribute
      dockerfile: Dockerfile
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    environment:
      CUDA_VISIBLE_DEVICES: ${CUDA_ASR:-7}
    shm_size: 10gb
    ports:
      - "5024:5024"
    volumes:
      - cache:/cache
    restart: on-failure

  ensemble_diarization:
    build:
      context: .
      dockerfile: ensemble_diarization/Dockerfile
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    environment:
      CUDA_VISIBLE_DEVICES: ${CUDA_ENSEMBLE:-7}
      DIARIZATION_URL: http://nemo_diarization:5022/diarize
      ALIGNMENT_URL: http://force_alignment:5023/align_words
      SPEAKER_ATTRIBUTE_BASE_URL: http://speaker_attribute:5024
    shm_size: 10gb
    ports:
      - "5025:5025"
    depends_on:
      - nemo_diarization
      - force_alignment
      - speaker_attribute
    restart: on-failure

volumes:
  cache: {}
