services:
  nemo_diarization:
    build:
      context: .
      dockerfile: nemo_diarization/Dockerfile
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    environment:
      CUDA_VISIBLE_DEVICES: ${CUDA_DIARIZATION:-1}
    shm_size: 10gb
    ports:
      - "5022:5022"
    networks:
      - backend
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5022/live"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 60s
    restart: on-failure

  force_alignment:
    build:
      context: .
      dockerfile: force_alignment/Dockerfile
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    environment:
      CUDA_VISIBLE_DEVICES: ${CUDA_FORCE_ALIGNMENT:-1}
    shm_size: 10gb
    ports:
      - "5023:5023"
    networks:
      - backend
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5023/healthz"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 60s
    restart: on-failure

  speaker_attribute:
    build:
      context: speaker_attribute
      dockerfile: Dockerfile
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    environment:
      CUDA_VISIBLE_DEVICES: ${CUDA_ASR:-1}
      FLASK_TRUSTED_HOSTS: ""
    shm_size: 10gb
    ports:
      - "5024:5024"
    volumes:
      - cache:/cache
    networks:
      - backend
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5024/asr/version"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 60s
    restart: on-failure

  ensemble_diarization:
    build:
      context: .
      dockerfile: ensemble_diarization/Dockerfile
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    environment:
      CUDA_VISIBLE_DEVICES: ${CUDA_ENSEMBLE:-1}
      DIARIZATION_URL: http://nemo_diarization:5022/diarize
      ALIGNMENT_URL: http://force_alignment:5023/align_words
      SPEAKER_ATTRIBUTE_BASE_URL: http://speaker_attribute:5024
    shm_size: 10gb
    ports:
      - "5025:5025"
    networks:
      - backend
    depends_on:
      nemo_diarization:
        condition: service_healthy
      force_alignment:
        condition: service_healthy
      speaker_attribute:
        condition: service_healthy
    restart: on-failure

volumes:
  cache: {}

networks:
  backend:
    driver: bridge